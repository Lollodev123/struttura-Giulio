site_name: Aerodinamica — Liceo Aeronautico
site_description: Pacchetto didattico (teoria, esercizi, quiz) per liceo aeronautico IT
site_url: https://lollodev123.github.io/struttura-Giulio/
repo_url: https://github.com/Lollodev123/struttura-Giulio
repo_name: Lollodev123/struttura-Giulio
edit_uri: edit/main/aerodinamica-liceo/
docs_dir: aerodinamica-liceo
site_dir: site

exclude_docs: |
  SETUP.md
  CONTRIBUTING.md
  01-teoria/_template-lezione.md
  03-esercizi/_template-esercizio.md
  .github/

nav:
  - Home: README.md
  - "✏️ Tutti gli esercizi": 03-esercizi/tutti.md
  - "📚 Teoria":
      - 1. Profilo alare: 01-teoria/01-profilo-alare.md
      - 2. Portanza: 01-teoria/02-portanza.md
      - 3. Resistenza: 01-teoria/03-resistenza.md
      - 4. Efficienza e polare: 01-teoria/04-efficienza.md
      - 5. Atmosfera ISA: 01-teoria/05-atmosfera-isa.md
      - 6. Reynolds: 01-teoria/06-numero-reynolds.md
      - 7. Geometria alare: 01-teoria/07-geometria-alare.md
      - 8. Momento e centraggio: 01-teoria/08-momento-centraggio.md
      - 9. Alta portanza: 01-teoria/09-alta-portanza.md
  - "🧠 Quiz":
      - Quiz dinamico (60 domande): 02-quiz/quiz-dinamico.md
      - Quiz BASE: 02-quiz/quiz-base.md
      - Quiz MEDIO: 02-quiz/quiz-medio.md
      - Quiz AVANZATO: 02-quiz/quiz-avanzato.md
      - Soluzioni: 02-quiz/soluzioni/soluzioni-quiz.md
  - "📐 Formulario":
      - Formulario: 00-formulario/formulario.md
      - Glossario IT/EN: 00-formulario/glossario.md

theme:
  name: material
  language: it
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Modalità scura
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/weather-sunny
        name: Modalità chiara
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      use_pygments: true
      auto_title: false
      anchor_linenums: false
      pygments_lang_class: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 3

extra_javascript:
  - assets/js/katex-init.js
  - assets/js/quiz.js
  - assets/js/banca-quiz.js
  - assets/js/indice-esercizi.js
  - https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js
  - https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js
  - https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js

extra_css:
  - assets/css/quiz.css
  - https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css
